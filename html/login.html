<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>家計簿マスター</title>
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="stylesheet" href="../css/header.css" />
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js" defer></script>
  <script src="../js/firebase.js" defer></script>
  <script src="../js/firebaseDb.js?v=3" defer></script>
  <script src="../js/login.js" defer></script>
  <script src="../js/header.js" defer></script>
</head>
<body>
  <div id="app-header"></div>
  <div class="page-wrapper">
    <main class="card" aria-labelledby="page-title">
      <header class="card-header">
        <h1 id="page-title" class="card-title">ログイン</h1>
        <p class="card-subtitle">
          家計簿アプリにログインして、購入データを管理します。
        </p>
      </header>

      <form class="form" onsubmit="event.preventDefault(); login();">
        <div class="form-row">
          <label for="userName" class="form-label">
            ユーザー名
          </label>
          <input
            type="text"
            id="userName"
            name="userName"
            class="form-input"
            autocomplete="username"
            placeholder="ユーザー名を入力"
            required
          />
        </div>

        <div class="form-row">
          <label for="password" class="form-label">
            パスワード
          </label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            autocomplete="current-password"
            placeholder="パスワードを入力"
            required
          />
        </div>

        <p id="login-error" class="error-message" aria-live="polite"></p>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            ログイン
          </button>
        </div>
      </form>

    </main>
  </div>
</body>
</html>
